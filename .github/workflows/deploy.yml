name: Deploy AirCanvas to AWS EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy site files to EC2
        uses: appleboy/scp-action@v0.1.8
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          port: ${{ secrets.EC2_PORT || 22 }}
          source: |
            Dockerfile
            nginx.conf
            .dockerignore
            index.html
          target: ~/aircanvas

      - name: Build and deploy Docker container on EC2
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          port: ${{ secrets.EC2_PORT || 22 }}
          script: |
            set -e
            mkdir -p ~/aircanvas
            cd ~/aircanvas
            docker build -t aircanvas:latest .
            container_id=$(docker ps -aq -f "name=^/aircanvas$")
            if [ -n "$container_id" ]; then
              docker rm -f aircanvas
            fi
            docker run -d --restart always --name aircanvas -p 80:80 aircanvas:latest
