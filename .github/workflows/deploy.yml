name: CI/CD pipeline for AirCanvas

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image for validation
        run: |
          docker build --pull --progress=plain -t aircanvas:ci .

  docker:
    name: Push Docker image
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image to Docker Hub
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/aircanvas:latest

  deploy:
    name: Deploy to EC2
    needs: docker
    runs-on: ubuntu-latest

    steps:
      - name: Deploy container on EC2 via SSH
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          port: ${{ secrets.EC2_PORT || 22 }}
          script: |
            set -e
            docker pull docker.io/${{ secrets.DOCKERHUB_USERNAME }}/aircanvas:latest
            if docker ps -q -f name=^/aircanvas$ >/dev/null 2>&1; then
              docker rm -f aircanvas
            fi
            docker run -d --restart always --name aircanvas -p 80:80 docker.io/${{ secrets.DOCKERHUB_USERNAME }}/aircanvas:latest
