<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Canvas</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>

    <style>
        :root {
            --neon: #00ffcc;
        }

        body { 
            margin: 0; 
            background: #000; 
            color: var(--neon); 
            font-family: 'Courier New', monospace; 
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        h1 { 
            margin: 10px 0; 
            font-size: 1.2rem; 
            text-align: center; 
            text-shadow: 0 0 10px var(--neon);
            z-index: 20;
        }

        .canvas-wrapper { 
            position: relative; 
            flex-grow: 1;
            width: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas { 
            position: absolute; 
            transform: scaleX(-1); 
            border-radius: 10px;
        }

        #drawing_canvas { z-index: 10; }
        #bg_canvas { z-index: 5; }

        .status-bar { 
            padding: 10px; 
            background: rgba(0, 255, 204, 0.15); 
            text-align: center; 
            z-index: 20;
            backdrop-filter: blur(5px);
        }

        #voice_status { color: #ff00ff; font-weight: bold; font-size: 0.9rem; }
        
        .commands-hint {
            font-size: 10px;
            color: #888;
            margin-top: 5px;
        }

        @media (min-width: 768px) {
            body { overflow: auto; padding-bottom: 20px; }
            .canvas-wrapper {
                width: 640px;
                height: 480px;
                margin: 0 auto;
                flex-grow: 0;
                border: 2px solid #333;
                box-shadow: 0 0 30px rgba(0, 255, 204, 0.2);
            }
            canvas {
                width: 640px;
                height: 480px;
            }
        }

        @media (max-width: 767px) {
            h1 { position: absolute; top: 0; width: 100%; background: rgba(0,0,0,0.5); margin: 0; padding: 10px 0; }
            .canvas-wrapper { width: 100vw; height: 100vh; margin: 0; }
            canvas {
                width: 100%;
                height: 100%;
                object-fit: cover;
                border-radius: 0;
            }
            .status-bar {
                position: absolute;
                bottom: 0;
                width: 100%;
                box-sizing: border-box;
            }
        }
    </style>
</head>
<body>

    <h1>AI CANVAS</h1>
    
    <div class="canvas-wrapper">
        <video id="webcam" style="display:none;"></video>
        <canvas id="bg_canvas"></canvas>
        <canvas id="drawing_canvas"></canvas>
    </div>

    <div class="status-bar">
        <span id="current_color" style="color: #00ffcc;"> ⬤ </span> | 
        <span id="voice_status">Voice: Listening...</span>
        <div class="commands-hint">Commands: Red, Blue, Green, Yellow, Clear</div>
    </div>

    <script>
        const videoElement = document.getElementById('webcam');
        const bgCanvas = document.getElementById('bg_canvas');
        const drawCanvas = document.getElementById('drawing_canvas');
        const bgCtx = bgCanvas.getContext('2d');
        const drawCtx = drawCanvas.getContext('2d');
        const voiceStatus = document.getElementById('voice_status');
        const colorIndicator = document.getElementById('current_color');

        let prevX = null, prevY = null;
        let activeColor = "#00ffcc";

        function resize() {
            const isMobile = window.innerWidth < 768;
            if (isMobile) {
                bgCanvas.width = drawCanvas.width = window.innerWidth;
                bgCanvas.height = drawCanvas.height = window.innerHeight;
            } else {
                bgCanvas.width = drawCanvas.width = 640;
                bgCanvas.height = drawCanvas.height = 480;
            }
        }
        window.addEventListener('resize', resize);
        resize();

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            const recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.lang = 'en-US';
            recognition.onresult = (event) => {
                const command = event.results[event.results.length - 1][0].transcript.toLowerCase();
                voiceStatus.innerText = `Heard: "${command}"`;
                
                if (command.includes("red")) activeColor = "#ff0000";
                else if (command.includes("blue")) activeColor = "#0000ff";
                else if (command.includes("green")) activeColor = "#00ff00";
                else if (command.includes("yellow")) activeColor = "#ffff00";
                else if (command.includes("white")) activeColor = "#ffffff";
                else if (command.includes("clear")) clearCanvas();

                colorIndicator.style.color = activeColor;
            };
            recognition.start();
            recognition.onend = () => recognition.start();
        }

        function onResults(results) {
            bgCtx.save();
            bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
            
            bgCtx.drawImage(results.image, 0, 0, bgCanvas.width, bgCanvas.height);

            if (results.multiHandLandmarks) {
                for (const landmarks of results.multiHandLandmarks) {
                    drawConnectors(bgCtx, landmarks, HAND_CONNECTIONS, {color: '#00FFCC', lineWidth: 2});
                    drawLandmarks(bgCtx, landmarks, {color: '#FF00FF', lineWidth: 1, radius: 2});

                    const indexTip = landmarks[8];
                    const x = indexTip.x * bgCanvas.width;
                    const y = indexTip.y * bgCanvas.height;

                    const isIndexUp = landmarks[8].y < landmarks[6].y;
                    const isMiddleUp = landmarks[12].y < landmarks[10].y;
                    const isRingUp = landmarks[16].y < landmarks[14].y;
                    const isPinkyUp = landmarks[20].y < landmarks[18].y;

                    if (isIndexUp && isMiddleUp && isRingUp && isPinkyUp) {
                        drawCtx.globalCompositeOperation = 'destination-out';
                        drawCtx.beginPath();
                        drawCtx.arc(x, y, 40, 0, Math.PI * 2);
                        drawCtx.fill();
                        prevX = null; prevY = null;
                    } 
                    else if (isIndexUp && isMiddleUp) {
                        prevX = null; prevY = null;
                        bgCtx.beginPath();
                        bgCtx.strokeStyle = activeColor;
                        bgCtx.arc(x, y, 15, 0, Math.PI * 2);
                        bgCtx.stroke();
                    } 
                    else if (isIndexUp) {
                        drawCtx.globalCompositeOperation = 'source-over';
                        if (prevX !== null && prevY !== null) {
                            drawCtx.beginPath();
                            drawCtx.strokeStyle = activeColor;
                            drawCtx.lineWidth = 6;
                            drawCtx.lineCap = "round";
                            drawCtx.shadowBlur = 10;
                            drawCtx.shadowColor = activeColor;
                            drawCtx.moveTo(prevX, prevY);
                            drawCtx.lineTo(x, y);
                            drawCtx.stroke();
                        }
                        prevX = x; prevY = y;
                    } else {
                        prevX = null; prevY = null;
                    }
                }
            }
            bgCtx.restore();
        }

        const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7 });
        hands.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            width: 640, height: 480
        });
        camera.start();

        function clearCanvas() {
            drawCtx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
        }
    </script>
</body>
</html>
